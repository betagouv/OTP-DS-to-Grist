services:
  app:
    build: .
    ports:
      - "5000:5000"
    volumes:
      - .:/app
      - poetry_venv:/home/appuser/.cache/pypoetry/virtualenvs
      - poetry_cache:/home/appuser/.cache/pypoetry
    env_file:
      - .env
    environment:
      - POETRY_VIRTUALENVS_PATH=/home/appuser/.cache/pypoetry/virtualenvs
    depends_on:
      - db

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: otp_ds
      POSTGRES_USER: otp_user
      POSTGRES_PASSWORD: otp_password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
  poetry_venv:
  poetry_cache:
