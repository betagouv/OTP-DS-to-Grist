services:
  app:
    build: .
    ports:
      - "5000:5000"
    volumes:
      - ./app.py:/app/app.py
      - ./constants.py:/app/constants.py
      - ./queries.py:/app/queries.py
      - ./queries_extract.py:/app/queries_extract.py
      - ./queries_graphql.py:/app/queries_graphql.py
      - ./queries_util.py:/app/queries_util.py
      - ./schema_utils.py:/app/schema_utils.py
      - ./repetable_processor.py:/app/repetable_processor.py
      - ./grist_processor_working_all.py:/app/grist_processor_working_all.py
      - ./sync_task_manager.py:/app/sync_task_manager.py
      - ./configuration:/app/configuration
      - ./database:/app/database
      - ./templates:/app/templates
      - ./static:/app/static
    environment:
      - PATH=/app/.venv/bin:$PATH
      - DATABASE_URL=${DOCKER_DATABASE_URL}
    depends_on:
      - db

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
